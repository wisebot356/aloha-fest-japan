<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mahalo! — Aloha Fest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --ink:#163646; --cream:#fff8e8; --coral:#e75745; --sun:#ffb31b; --wave:#007f94; }
    *{box-sizing:border-box} body{margin:0;min-height:100svh;display:grid;place-items:center;background:var(--cream);color:var(--ink);font-family:"M PLUS Rounded 1c",sans-serif;padding:24px;text-align:center}main{max-width:560px}.flower{font-size:92px;color:var(--coral);text-shadow:5px 5px 0 var(--sun)}h1{font:italic clamp(60px,15vw,110px)/.8 "DM Serif Display",serif;color:var(--coral);letter-spacing:-.06em;margin:15px 0 28px}p{font-size:17px;line-height:2;margin:0 auto 30px}a{display:inline-block;background:var(--ink);color:var(--cream);font-weight:800;text-decoration:none;padding:15px 22px;box-shadow:5px 5px 0 var(--sun)}small{display:block;margin-top:30px;color:var(--wave)}
  </style>
</head>
<body>
  <main>
    <div class="flower">✿</div>
    <h1>Mahalo!</h1>
    <p>ご興味をありがとうございます。<br />出店についてのご相談を、主催チームからあらためてご連絡します。</p>
    <a href="./">アロハ・フェストのページへ戻る</a>
    <small>Aloha Fest — A little Hawai‘i. A lot of heart.</small>
  </main>
</body>
</html>
